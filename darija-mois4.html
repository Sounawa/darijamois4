        const appris = leçonsTerminées.filter(id => id.startsWith('4-')).length;
        const pourcentage = (appris / totalLecons) * 100;
        document.getElementById('progressFill').style.width = pourcentage + '%';
        document.getElementById('progressText').textContent = appris + '/' + totalLecons + ' leçons terminées';
    }

    function terminerLecon(mois, theme) {
        const id = `${mois}-${theme}`;
        if (!leçonsTerminées.includes(id)) {
            leçonsTerminées.push(id);
            localStorage.setItem('darija_mois4_rouge', JSON.stringify(leçonsTerminées));
        }
        updateProgressBar();
        afficherMessage("Bravo ! Leçon terminée ! 🌟");
        afficherOnglet('lecons');
    }

        const contenu = document.getElementById('contenu');
        const divMsg = document.createElement('div');
        divMsg.className = 'message-felicitation';
        divMsg.innerText = msg;
        contenu.prepend(divMsg);
        setTimeout(() => divMsg.remove(), 3000);
    }

    function afficherLecons() {

        const themes = [...new Set(vocabulaireMois4.map(m => m.theme))];
        
        themes.forEach(theme => {
            const mots = vocabulaireMois4.filter(m => m.theme === theme);

            const estTerminé = leçonsTerminées.includes(id);
            
            html += `<div class="theme-carte">`;
            html += `<div class="theme-header ${estTerminé ? 'completed' : ''}">`;

            html += `<span style="font-size:0.9rem; font-weight:normal;">${mots.length} mots ${estTerminé ? '✅' : ''}</span>`;

                html += `<div class="mot-item">`;

                html += `<div><span class="mot-label">Latin</span><br><span class="latin">${m.latin}</span></div>`;
                html += `<div style="grid-column: 1/-1;"><span class="mot-label">Exemple</span><br><span class="phrase"><strong style="color:#c62828;">${m.phrase_latin}</strong> — ${m.phrase_fr}</span></div>`;
                html += `</div>`;
                html += `</div>`;
            });
            
            if (!estTerminé) {
                html += `<button class="btn-terminer" data-mois="4" data-theme="${theme}">✅ Marquer comme terminée</button>`;
            } else {
                html += `<p style="color:#2e7d32; text-align:center; font-weight:bold; padding:10px;">✔ Leçon terminée</p>`;
            }
            
            html += `</div>`;
            html += `</div>`;
        });
        
        contenu.innerHTML = html;

        document.querySelectorAll('.btn-terminer').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const mois = e.target.dataset.mois;

    function afficherOnglet(onglet) {
        document.querySelectorAll('.onglet').forEach(btn => btn.classList.remove('actif'));

        else if (onglet === 'conjugaisons') afficherConjugaisons();
        else if (onglet === 'revision') afficherRevision();
    }
